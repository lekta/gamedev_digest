name: Daily GameDev Digest

on:
  schedule:
    - cron: "17 5 * * *" # 05:17 UTC = 07:17 UTC+2 (Сербия); с учётом задержки GitHub ~2–2.5 ч выпуск готов к ~10:00 местного. Нестандартная минута — короче очередь
  workflow_dispatch: {} # ручной запуск: GitHub → Actions → Run workflow (работает и из мобильного приложения)

# Плановый и ручной запуски не выполняются одновременно: второй ждёт первого
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Проверить, не собран ли уже сегодняшний выпуск
        id: guard
        run: |
          TODAY=$(TZ=Europe/Moscow date +%F)
          # Плановый запуск пропускаем, если выпуск за сегодня уже есть (например, собран вручную).
          # Ручной запуск (workflow_dispatch) всегда пересобирает — для правок.
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "digests/${TODAY}.md" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Выпуск за ${TODAY} уже собран — плановый запуск пропущен."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Собрать выпуск
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-8 --allowedTools "Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Bash(grep:*),Bash(date:*),Bash(ls:*)"'
          prompt: |
            Собери сегодняшний выпуск GameDev Digest — ежедневной сводки новостей геймдева для Unity/C#-разработчика. Ты находишься в корне репозитория дайджеста.

            1. Прочитай config.md — это единственный источник правил: тематика, структура «новость → вывод → детали», объём, язык (только русский), антиповторы и 3-дневный кулдаун, проверка фактов на истинность, первоисточники.
            2. Прочитай memory/covered.md (что уже освещено), memory/to_explore.md (очередь тем), memory/sources.md (реестр источников).
            3. Собери дайджест строго по config.md, дата выпуска — сегодняшняя (UTC+3).
            4. Запиши результат в файлы:
               - digests/ГГГГ-ММ-ДД.md — новый выпуск;
               - memory/covered.md — добавь сегодняшний день, убери выпавший из окна 3 дней;
               - memory/to_explore.md — обнови при необходимости.
            5. Git-команд не выполняй — коммит сделает следующий шаг workflow.
            6. Если digests/ГГГГ-ММ-ДД.md за сегодня уже существует — пересобери его заново с учётом свежих новостей и перезапиши.

      - name: Собрать RSS-фид
        if: steps.guard.outputs.skip != 'true'
        run: |
          pip install --quiet markdown
          python3 scripts/build_feed.py

      - name: Закоммитить выпуск
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add digests memory feed.xml
          git diff --cached --quiet || git commit -m "Выпуск $(TZ=Europe/Moscow date +%F)"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
